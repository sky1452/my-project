name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend Go build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: back-end/univer

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Download dependencies
        run: go mod download

      - name: Build backend
        run: go build -o app ./cmd

      - name: Run Go tests
        run: go test ./...

  frontend:
    name: Frontend React build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: front-end/front

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: CI=false npm run build